<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ruberval Silva — Psicanalista</title>
  <meta name="description" content="Ruberval Silva, psicanalista. Florianópolis, SC." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:    #f0ece4;
      --text:  #0a0a0a;
      --muted: #6a6a60;
      --line:  #d0ccc4;
      --font:  'IBM Plex Mono', monospace;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-weight: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2.5rem 2rem;
      -webkit-font-smoothing: antialiased;
    }

    main {
      max-width: 400px;
      width: 100%;
      opacity: 0;
      animation: reveal 1.2s ease forwards;
      animation-delay: 0.3s;
    }

    @keyframes reveal {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .sigil {
      font-size: 1rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      margin-bottom: 2.8rem;
      user-select: none;
    }

    h1 {
      font-size: clamp(1.35rem, 4vw, 1.7rem);
      font-weight: 400;
      letter-spacing: 0.04em;
      color: var(--text);
      line-height: 1.3;
      margin-bottom: 0.45rem;
    }

    .role {
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 3rem;
    }

    .divider {
      width: 2rem;
      height: 1px;
      background: var(--line);
      margin-bottom: 3rem;
    }

    .contact {
      display: flex;
      flex-direction: column;
      gap: 1.3rem;
      margin-bottom: 3.2rem;
    }

    .contact-item {
      display: flex;
      align-items: baseline;
      gap: 1.2rem;
    }

    .contact-label {
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      min-width: 4.8rem;
      flex-shrink: 0;
    }

    .contact-value {
      font-size: 0.9rem;
      color: var(--text);
      letter-spacing: 0.04em;
    }

    a.contact-value {
      color: var(--text);
      text-decoration: none;
      transition: color 0.25s ease;
    }

    a.contact-value:hover {
      color: var(--muted);
    }

    .qr-section {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .qr-label {
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .qr-wrapper {
      display: inline-block;
      padding: 10px;
      background: #0a0a0a;
      border-radius: 3px;
      width: fit-content;
      transition: opacity 0.2s ease;
    }

    .qr-wrapper:hover {
      opacity: 0.82;
    }

    #qrcode canvas,
    #qrcode img {
      display: block;
    }

    .qr-hint {
      font-size: 0.62rem;
      letter-spacing: 0.14em;
      color: var(--muted);
    }

    footer {
      margin-top: 4.5rem;
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      color: var(--line);
      text-transform: uppercase;
      user-select: none;
    }
  </style>
</head>
<body>
  <main>
    <div class="sigil">$ ̶</div>

    <h1>Ruberval Silva</h1>
    <p class="role">Psicanalista</p>

    <div class="divider"></div>

    <div class="contact">
      <div class="contact-item">
        <span class="contact-label">local</span>
        <span class="contact-value">Florianópolis, SC</span>
      </div>
      <div class="contact-item">
        <span class="contact-label">atendimento</span>
        <span class="contact-value">presencial e online</span>
      </div>
      <div class="contact-item">
        <span class="contact-label">contato</span>
        <a class="contact-value" href="tel:+5548988717486">(48) 98871-7486</a>
      </div>
    </div>

    <div class="qr-section">
      <span class="qr-label">WhatsApp</span>
      <a href="https://wa.me/5548988717486" target="_blank" rel="noopener" aria-label="Enviar mensagem pelo WhatsApp">
        <div class="qr-wrapper">
          <div id="qrcode"></div>
        </div>
      </a>
      <span class="qr-hint">escaneie ou toque para enviar mensagem</span>
    </div>

    <footer>Florianópolis · SC · Brasil</footer>
  </main>

  <script>
    new QRCode(document.getElementById("qrcode"), {
      text: "https://wa.me/5548988717486",
      width: 120,
      height: 120,
      colorDark: "#f0ece4",
      colorLight: "#0a0a0a",
      correctLevel: QRCode.CorrectLevel.M
    });
  </script>
</body>
</html>
